kind = "web"
previewPath = "/"
title = "Holo-Sync: Biometric Interviewer"
version = "1.0.0"
id = "artifacts/holo-sync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24185

[services.development]
run = "pnpm --filter @workspace/holo-sync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/holo-sync", "run", "build" ]
publicDir = "artifacts/holo-sync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24185"
BASE_PATH = "/"
